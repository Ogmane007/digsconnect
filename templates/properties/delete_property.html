{% extends "base.html" %}
{% block content %}

<h2>Delete Property</h2>
<p>Are you sure you want to delete <strong>{{ property.title }}</strong>?</p>

<form method="post">
  {% csrf_token %}
  <button class="btn btn-danger">Yes, delete</button>
  <a class="btn btn-outline-secondary" href="{% url 'dashboard' %}">Cancel</a>
</form>

{% endblock %}
