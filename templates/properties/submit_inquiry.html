{% extends "base.html" %}
{% block content %}
<h2>Contact landlord about: {{ property.title }}</h2>

<form method="post" class="mt-3">
  {% csrf_token %}
  {{ form.as_p }}
  <button class="btn btn-primary">Send Inquiry</button>
  <a class="btn btn-outline-secondary" href="{% url 'property_detail' property.id %}">Cancel</a>
</form>
{% endblock %}
